name: Bug report
description: Report something that's broken or not working as expected.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out the sections below
        so we can reproduce and fix the issue quickly.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A concise description of the bug.
      placeholder: e.g. Garlic aura does not damage enemies after picking up a second stack.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Tell us exactly how to trigger the bug. Numbered steps are best.
      value: |
        1. Launch the game via `npm start`
        2. Pick weapon '...'
        3. Survive until '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Attach screenshots, GIFs, or console output if possible.
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser / version
      placeholder: e.g. Chrome 124, Firefox 125, Safari 17.4
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. macOS 14.4, Windows 11, Ubuntu 22.04
    validations:
      required: true
  - type: dropdown
    id: input-device
    attributes:
      label: Input device
      options:
        - Keyboard
        - Mouse / trackpad
        - Touchscreen
        - Gamepad
        - Other
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Commit / version
      description: Output of `git rev-parse --short HEAD`, or the release tag.
      placeholder: e.g. v2.0.0 or abc1234
  - type: textarea
    id: logs
    attributes:
      label: Console output
      description: Paste any DevTools console errors or warnings here.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I can reproduce this on a fresh clone of the repository.
          required: false
