<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" role="img" aria-labelledby="title desc">
    <title id="title">Survivor — open-source HTML5 Canvas roguelite</title>
    <desc id="desc">A stylised wordmark with a glowing purple gradient on a dark backdrop, evoking a vampiric arena.</desc>
    <defs>
        <radialGradient id="glow" cx="50%" cy="50%" r="60%">
            <stop offset="0%" stop-color="#c97bff" stop-opacity="0.55" />
            <stop offset="60%" stop-color="#3a1166" stop-opacity="0.25" />
            <stop offset="100%" stop-color="#0a0a12" stop-opacity="0" />
        </radialGradient>
        <linearGradient id="textFill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffe89a" />
            <stop offset="55%" stop-color="#ffb400" />
            <stop offset="100%" stop-color="#a04500" />
        </linearGradient>
        <linearGradient id="bgFill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#1b1330" />
            <stop offset="100%" stop-color="#0a0a12" />
        </linearGradient>
    </defs>
    <rect width="800" height="240" fill="url(#bgFill)" rx="12" />
    <ellipse cx="400" cy="120" rx="360" ry="120" fill="url(#glow)" />
    <!-- Decorative orbit shards (matches in-game Orbiter weapon) -->
    <g fill="#ffd24d" opacity="0.85">
        <circle cx="80" cy="60" r="4" />
        <circle cx="720" cy="60" r="4" />
        <circle cx="80" cy="180" r="4" />
        <circle cx="720" cy="180" r="4" />
        <circle cx="60" cy="120" r="3" />
        <circle cx="740" cy="120" r="3" />
    </g>
    <!-- Decorative bats / silhouettes -->
    <g fill="#3a1166" opacity="0.55">
        <path d="M120 200 q15 -22 30 0 q15 -22 30 0 z" />
        <path d="M620 40 q15 -22 30 0 q15 -22 30 0 z" />
    </g>
    <text x="400" y="148"
          font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-size="96"
          font-weight="900"
          letter-spacing="6"
          text-anchor="middle"
          fill="url(#textFill)"
          stroke="#3a1166"
          stroke-width="3"
          paint-order="stroke fill">SURVIVOR</text>
    <text x="400" y="190"
          font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-size="18"
          letter-spacing="4"
          text-anchor="middle"
          fill="#c0a8ff"
          opacity="0.9">OPEN · SOURCE · CANVAS · ROGUELITE</text>
</svg>
