<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
    <title id="title">Canvas Vampire Survivors — open-source HTML5 roguelite</title>
    <desc id="desc">Social card showing the Survivor logo, tagline, and key bullets.</desc>
    <defs>
        <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#1b1330" />
            <stop offset="100%" stop-color="#06060c" />
        </linearGradient>
        <radialGradient id="halo" cx="50%" cy="35%" r="60%">
            <stop offset="0%" stop-color="#c97bff" stop-opacity="0.55" />
            <stop offset="100%" stop-color="#0a0a12" stop-opacity="0" />
        </radialGradient>
        <linearGradient id="brand" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffe89a" />
            <stop offset="55%" stop-color="#ffb400" />
            <stop offset="100%" stop-color="#a04500" />
        </linearGradient>
    </defs>
    <rect width="1200" height="630" fill="url(#bgGrad)" />
    <ellipse cx="600" cy="240" rx="640" ry="220" fill="url(#halo)" />
    <!-- Faux orbit ring -->
    <circle cx="600" cy="240" r="170" fill="none" stroke="#ffd24d" stroke-opacity="0.18" stroke-width="2" stroke-dasharray="6 10" />
    <!-- Hero glyph (player dot) -->
    <circle cx="600" cy="240" r="22" fill="#3388ff" />
    <circle cx="600" cy="240" r="22" fill="none" stroke="#a8c8ff" stroke-width="3" />
    <!-- Orbit shards -->
    <g fill="#fff1a8">
        <circle cx="770" cy="240" r="9" />
        <circle cx="430" cy="240" r="9" />
        <circle cx="600" cy="70" r="9" />
        <circle cx="600" cy="410" r="9" />
    </g>
    <!-- Enemy dots -->
    <g fill="#aa44ff">
        <circle cx="280" cy="160" r="10" />
        <circle cx="930" cy="320" r="10" />
        <circle cx="320" cy="380" r="10" />
        <circle cx="900" cy="120" r="10" />
        <circle cx="220" cy="320" r="10" />
    </g>
    <!-- Title -->
    <text x="600" y="500"
          font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-size="120"
          font-weight="900"
          letter-spacing="8"
          text-anchor="middle"
          fill="url(#brand)"
          stroke="#3a1166"
          stroke-width="4"
          paint-order="stroke fill">SURVIVOR</text>
    <!-- Tagline -->
    <text x="600" y="555"
          font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-size="26"
          letter-spacing="2"
          text-anchor="middle"
          fill="#e8ebf3">A zero-dependency HTML5 Canvas roguelite. Clone, play, hack.</text>
    <text x="600" y="595"
          font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-size="20"
          letter-spacing="3"
          text-anchor="middle"
          fill="#c0a8ff"
          opacity="0.85">VANILLA JS · OPEN SOURCE · MIT</text>
</svg>
